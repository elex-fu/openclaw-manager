name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        default: true
        type: boolean

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  build:
    name: Build ${{ matrix.platform }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Intel
          - os: macos-13
            platform: macos
            arch: x86_64
            target: x86_64-apple-darwin
          # macOS Apple Silicon
          - os: macos-latest
            platform: macos
            arch: aarch64
            target: aarch64-apple-darwin
          # Windows x64
          - os: windows-latest
            platform: windows
            arch: x86_64
            target: x86_64-pc-windows-msvc
          # Windows ARM64
          - os: windows-latest
            platform: windows
            arch: aarch64
            target: aarch64-pc-windows-msvc
          # Linux x64
          - os: ubuntu-22.04
            platform: linux
            arch: x86_64
            target: x86_64-unknown-linux-gnu
          # Linux ARM64
          - os: ubuntu-22.04
            platform: linux
            arch: aarch64
            target: aarch64-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download offline packages
        shell: bash
        run: |
          mkdir -p src-tauri/bundled
          PLATFORM="${{ matrix.platform }}"
          ARCH="${{ matrix.arch }}"
          if [ "$PLATFORM" = "windows" ]; then
            EXT="zip"
          else
            EXT="tar.gz"
          fi
          FILENAME="openclaw-${{ steps.version.outputs.version }}-${PLATFORM}-${ARCH}.${EXT}"
          URL="https://github.com/openclai/openclaw/releases/download/${{ steps.version.outputs.version }}/${FILENAME}"
          echo "Attempting to download: $URL"
          curl -L --fail -o "src-tauri/bundled/${FILENAME}" "$URL" 2>/dev/null || {
            echo "Note: Offline package not available at $URL"
            echo "Build will continue without embedded package"
          }

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          if-no-files-found: warn

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*'

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenClaw Manager ${{ github.ref_name }}
          body: |
            ## Downloads

            ### macOS
            - Intel (x64): `OpenClaw Manager_*_x64.dmg`
            - Apple Silicon: `OpenClaw Manager_*_aarch64.dmg`

            ### Windows
            - x64: `OpenClaw Manager_*_x64_en-US.msi`
            - ARM64: `OpenClaw Manager_*_aarch64_en-US.msi`

            ### Linux
            - Debian/Ubuntu: `openclaw-manager_*.deb`
            - Fedora/RHEL: `openclaw-manager-*.rpm`
            - Universal: `openclaw-manager_*.AppImage`

            ## Requirements
            - macOS 10.15+ (Intel) / macOS 11+ (Apple Silicon)
            - Windows 10 1809+ / Windows 11
            - Ubuntu 20.04+ / Debian 11+ / Fedora 35+
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
          draft: ${{ github.event.inputs.draft != 'false' }}
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
