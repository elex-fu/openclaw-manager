name: Sidecar E2E Tests

on:
  push:
    branches: [main, develop, feature/*]
    paths:
      - 'src-tauri/src/installer/**'
      - 'src-tauri/src/services/sidecar*.rs'
      - 'src/lib/tauri-api.ts'
      - 'src/pages/InstallWizard.tsx'
      - 'src/pages/Dashboard.tsx'
      - 'e2e/sidecar-*.spec.ts'
      - '.github/workflows/sidecar-e2e-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src-tauri/src/installer/**'
      - 'src-tauri/src/services/sidecar*.rs'
      - 'src/lib/tauri-api.ts'
      - 'src/pages/InstallWizard.tsx'
      - 'src/pages/Dashboard.tsx'
      - 'e2e/sidecar-*.spec.ts'

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'

jobs:
  # Test on macOS
  test-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Build Tauri app
        run: npm run tauri:build
        env:
          RUSTC_WRAPPER: ''

      - name: Run Sidecar E2E tests
        run: npx playwright test e2e/sidecar-installation.spec.ts --project=chromium
        env:
          CI: true
        timeout-minutes: 20

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-macos
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # Test on Ubuntu
  test-ubuntu:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Build Tauri app
        run: npm run tauri:build
        env:
          RUSTC_WRAPPER: ''

      - name: Run Sidecar E2E tests
        run: xvfb-run npx playwright test e2e/sidecar-installation.spec.ts --project=chromium
        env:
          CI: true
          DISPLAY: ':99'
        timeout-minutes: 20

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ubuntu
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # Test on Windows
  test-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Build Tauri app
        run: npm run tauri:build
        env:
          RUSTC_WRAPPER: ''

      - name: Run Sidecar E2E tests
        run: npx playwright test e2e/sidecar-installation.spec.ts --project=chromium
        env:
          CI: true
        timeout-minutes: 20

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-windows
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # Summary
  test-summary:
    needs: [test-macos, test-ubuntu, test-windows]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Test Summary
        run: |
          echo "## Sidecar E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- macOS: ${{ needs.test-macos.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Ubuntu: ${{ needs.test-ubuntu.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Windows: ${{ needs.test-windows.result }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.test-macos.result }}" = "success" ] && [ "${{ needs.test-ubuntu.result }}" = "success" ] && [ "${{ needs.test-windows.result }}" = "success" ]; then
            echo "### ✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Some tests failed" >> $GITHUB_STEP_SUMMARY
          fi
