name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 20

jobs:
  # Create release draft
  create-release:
    name: Create Release Draft
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release Draft
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `OpenClaw Manager ${context.ref.replace('refs/tags/v', '')}`,
              draft: true,
              prerelease: context.ref.includes('alpha') || context.ref.includes('beta') || context.ref.includes('rc'),
              generate_release_notes: true
            })
            return data.id

  # Build and upload for macOS
  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./openclaw-manager/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.arch == 'aarch64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './openclaw-manager/src-tauri'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri:build -- --target ${{ matrix.arch == 'aarch64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}
        env:
          CI: true
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload to Release (DMG)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const path = require('path')
            const dmgPath = path.join(process.cwd(), 'src-tauri/target/release/bundle/dmg')
            const files = fs.readdirSync(dmgPath).filter(f => f.endsWith('.dmg'))
            for (const file of files) {
              const data = fs.readFileSync(path.join(dmgPath, file))
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: ${{ needs.create-release.outputs.release_id }},
                name: file,
                data: data
              })
            }

      - name: Upload to Release (App)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const path = require('path')
            const appPath = path.join(process.cwd(), 'src-tauri/target/release/bundle/macos')
            const files = fs.readdirSync(appPath).filter(f => f.endsWith('.app.tar.gz'))
            for (const file of files) {
              const data = fs.readFileSync(path.join(appPath, file))
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: ${{ needs.create-release.outputs.release_id }},
                name: file,
                data: data
              })
            }

  # Build and upload for Windows
  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./openclaw-manager/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './openclaw-manager/src-tauri'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri:build
        env:
          CI: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload to Release (MSI)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const path = require('path')
            const msiPath = path.join(process.cwd(), 'src-tauri/target/release/bundle/msi')
            const files = fs.readdirSync(msiPath).filter(f => f.endsWith('.msi'))
            for (const file of files) {
              const data = fs.readFileSync(path.join(msiPath, file))
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: ${{ needs.create-release.outputs.release_id }},
                name: file,
                data: data
              })
            }

      - name: Upload to Release (NSIS)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const path = require('path')
            const nsisPath = path.join(process.cwd(), 'src-tauri/target/release/bundle/nsis')
            const files = fs.readdirSync(nsisPath).filter(f => f.endsWith('.exe'))
            for (const file of files) {
              const data = fs.readFileSync(path.join(nsisPath, file))
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: ${{ needs.create-release.outputs.release_id }},
                name: file,
                data: data
              })
            }

  # Build and upload for Linux
  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./openclaw-manager/package-lock.json

      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './openclaw-manager/src-tauri'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri:build -- --target ${{ matrix.target }}
        env:
          CI: true

      - name: Upload to Release (DEB)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const path = require('path')
            const debPath = path.join(process.cwd(), 'src-tauri/target/release/bundle/deb')
            const files = fs.readdirSync(debPath).filter(f => f.endsWith('.deb'))
            for (const file of files) {
              const data = fs.readFileSync(path.join(debPath, file))
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: ${{ needs.create-release.outputs.release_id }},
                name: file,
                data: data
              })
            }

      - name: Upload to Release (AppImage)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const path = require('path')
            const appimagePath = path.join(process.cwd(), 'src-tauri/target/release/bundle/appimage')
            const files = fs.readdirSync(appimagePath).filter(f => f.endsWith('.AppImage'))
            for (const file of files) {
              const data = fs.readFileSync(path.join(appimagePath, file))
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: ${{ needs.create-release.outputs.release_id }},
                name: file,
                data: data
              })
            }

  # Publish release
  publish-release:
    name: Publish Release
    needs: [create-release, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: always() && needs.create-release.result == 'success'

    steps:
      - name: Publish Release
        uses: actions/github-script@v7
        with:
          script: |
            const allSucceeded = [
              '${{ needs.build-macos.result }}',
              '${{ needs.build-windows.result }}',
              '${{ needs.build-linux.result }}'
            ].every(r => r === 'success')

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: !allSucceeded
            })
